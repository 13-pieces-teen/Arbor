<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>arbor · hypothesis tree replay</title>
<style>
  :root{
    --bg:#0b0e14; --bg2:#0d1117; --panel:#161b22; --panel2:#1b212b;
    --border:#2a313c; --border2:#30363d; --fg:#e3e9f0; --dim:#8b949e; --dim2:#6e7681;
    --cyan:#39c5cf; --green:#3fb950; --yellow:#d29922; --magenta:#bc8cff;
    --red:#f85149; --blue:#58a6ff;
    --grad:linear-gradient(95deg,#39c5cf 0%,#58a6ff 45%,#bc8cff 100%);
    --ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:radial-gradient(1200px 600px at 70% -10%,#11161f 0%,var(--bg) 60%);
    color:var(--fg);font-family:var(--ui);font-size:15px;line-height:1.5;
    display:flex;flex-direction:column;min-height:100vh}
  .mono{font-family:var(--mono);font-feature-settings:"tnum" 1}
  a{color:var(--cyan);text-decoration:none}

  header{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;
    padding:18px 24px 10px;border-bottom:1px solid var(--border)}
  .brand{font-weight:800;font-size:1.5em;letter-spacing:.2px;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .tagline{color:var(--dim);font-size:.9em}
  .runmeta{margin-left:auto;text-align:right;color:var(--dim);font-size:.82em;max-width:46ch}
  .runmeta b{color:var(--fg);font-weight:600}

  .scorebar{display:flex;align-items:center;gap:26px;flex-wrap:wrap;
    padding:14px 24px;border-bottom:1px solid var(--border);background:var(--bg2)}
  .stat{display:flex;flex-direction:column;gap:1px}
  .stat .k{font-size:.72em;text-transform:uppercase;letter-spacing:.6px;color:var(--dim2)}
  .stat .v{font-size:1.05em;font-weight:650}
  .best .v{font-size:1.9em;line-height:1;color:var(--green);
    text-shadow:0 0 18px rgba(63,185,80,.35)}
  .best .v .x{font-size:.5em;color:var(--dim);font-weight:500;margin-left:2px}
  .legend{margin-left:auto;display:flex;gap:14px;flex-wrap:wrap;font-size:.78em;color:var(--dim)}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}

  main{flex:1;position:relative;overflow:hidden;min-height:340px}
  svg{display:block;width:100%;height:100%}
  .edge{fill:none;stroke:var(--border2);stroke-width:2;
    transition:stroke .4s,opacity .4s,stroke-dasharray .4s;opacity:.0}
  .edge.shown{opacity:.9}
  .edge.merged{stroke:var(--green);stroke-width:2.6}
  .edge.pruned{stroke:var(--dim2);stroke-dasharray:3 5;opacity:.4}

  .node{cursor:default;opacity:0;transform:scale(.2);transform-box:fill-box;
    transform-origin:center;transition:opacity .45s cubic-bezier(.2,.9,.3,1.3),
    transform .45s cubic-bezier(.2,.9,.3,1.3)}
  .node.born{opacity:1;transform:scale(1)}
  .node .dot{stroke:var(--bg);stroke-width:2;fill:var(--dim);transition:fill .4s,r .3s}
  .node.proposed .dot{fill:var(--yellow)}
  .node.running  .dot{fill:var(--magenta);animation:pulse 1.1s ease-in-out infinite}
  .node.done     .dot{fill:var(--blue)}
  .node.merged   .dot{fill:var(--green);filter:drop-shadow(0 0 7px rgba(63,185,80,.7))}
  .node.pruned   .dot{fill:var(--dim2)}
  .node.pruned   {opacity:.5}
  .node.failed   .dot{fill:var(--red)}
  @keyframes pulse{0%,100%{r:7px}50%{r:9px}}
  .node .hyp{fill:var(--fg);font-size:12px;font-family:var(--ui)}
  .node.pruned .hyp{fill:var(--dim)}
  .node .score{font-family:var(--mono);font-size:11px;fill:var(--green);font-weight:700}
  .node.pruned .score,.node.proposed .score,.node.running .score{fill:var(--dim)}
  .node .nid{font-family:var(--mono);font-size:9.5px;fill:var(--dim2)}

  footer{display:flex;align-items:center;gap:16px;padding:12px 24px;
    border-top:1px solid var(--border);background:var(--bg2)}
  button.play{appearance:none;border:1px solid var(--border2);background:var(--panel2);
    color:var(--fg);width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:15px;
    display:grid;place-items:center;transition:background .15s,border-color .15s}
  button.play:hover{background:#232c3a;border-color:var(--cyan)}
  .scrub{flex:1;display:flex;align-items:center;gap:12px}
  input[type=range]{flex:1;accent-color:var(--cyan);cursor:pointer;height:4px}
  .clock{font-family:var(--mono);font-size:.85em;color:var(--dim);min-width:9ch}
  .speeds{display:flex;gap:6px}
  .speeds button{appearance:none;border:1px solid var(--border2);background:transparent;
    color:var(--dim);padding:4px 9px;border-radius:7px;cursor:pointer;font-size:.8em;font-weight:600}
  .speeds button.on{color:var(--bg);background:var(--cyan);border-color:var(--cyan)}
  .hint{padding:6px 24px 16px;color:var(--dim2);font-size:.76em;text-align:center}
</style>
</head>
<body>
<header>
  <span class="brand">arbor</span>
  <span class="tagline">Grow evidence, not logs.</span>
  <div class="runmeta">
    <div><b id="m-run">—</b> <span id="m-model" class="mono"></span></div>
    <div id="m-task"></div>
  </div>
</header>

<div class="scorebar">
  <div class="stat best"><span class="k">best</span>
    <span class="v"><span id="s-best">—</span><span class="x" id="s-x"></span></span></div>
  <div class="stat"><span class="k">baseline</span><span class="v mono" id="s-base">—</span></div>
  <div class="stat"><span class="k">branches</span><span class="v mono" id="s-branches">0</span></div>
  <div class="stat"><span class="k">merged</span><span class="v mono" id="s-merged">0</span></div>
  <div class="stat"><span class="k">pruned</span><span class="v mono" id="s-pruned">0</span></div>
  <div class="legend">
    <span><i style="background:var(--yellow)"></i>proposed</span>
    <span><i style="background:var(--magenta)"></i>running</span>
    <span><i style="background:var(--blue)"></i>kept</span>
    <span><i style="background:var(--green)"></i>merged</span>
    <span><i style="background:var(--dim2)"></i>pruned</span>
  </div>
</div>

<main><svg id="svg"><g id="edges"></g><g id="nodes"></g></svg></main>

<footer>
  <button class="play" id="play" title="play / pause">▮▮</button>
  <div class="scrub">
    <input type="range" id="seek" min="0" max="1000" value="0">
    <span class="clock"><span id="t-now">0:00</span> / <span id="t-end">0:00</span></span>
  </div>
  <div class="speeds" id="speeds"></div>
</footer>
<div class="hint">A hypothesis tree growing from a real run · drag the timeline to scrub · made with <b>arbor replay --html</b></div>

<script>
const DATA = __ARBOR_DATA__;

// ── model: fold events into per-node state at a virtual clock ────────────────
const META = DATA.meta || {};
const EVENTS = (DATA.events || []).filter(e => e && typeof e.ts === "number");
const T0 = EVENTS.length ? EVENTS[0].ts : 0;
const TEND = EVENTS.length ? EVENTS[EVENTS.length-1].ts : 0;
const DURATION = Math.max(0.001, TEND - T0);
const MIN = (META.metric_direction === "minimize");
const BASE = (typeof META.baseline_score === "number") ? META.baseline_score : null;

// Synthetic trunk so nodes proposed against the (unshown) baseline have a root.
const ROOT = "·root·";

// Discover topology from the full event stream (final tree shape is stable).
function buildTopology(){
  const nodes = new Map();
  const ensure = id => { if(!nodes.has(id)) nodes.set(id,{id,parent:ROOT,hyp:"",born:Infinity}); return nodes.get(id); };
  nodes.set(ROOT,{id:ROOT,parent:null,hyp:"baseline",born:T0,score:BASE,synthetic:true});
  for(const e of EVENTS){
    const d = e.data||{};
    if(e.type==="idea.proposed" && d.node_id){
      const n = ensure(d.node_id);
      n.hyp = (d.hypothesis||"").replace(/\s+/g," ").trim();
      n.born = Math.min(n.born, e.ts);
      n.rawParent = d.parent_id;
    } else if(d.node_id){
      const n = ensure(d.node_id); n.born = Math.min(n.born, e.ts);
    }
  }
  // Reparent: a parent we never saw (e.g. "root") attaches to the synthetic trunk.
  for(const n of nodes.values()){
    if(n.id===ROOT) continue;
    n.parent = (n.rawParent && nodes.has(n.rawParent) && n.rawParent!==n.id) ? n.rawParent : ROOT;
  }
  return nodes;
}
const NODES = buildTopology();

// State of every node at clock t (seconds since T0). Mirrors run_state.py.
function stateAt(t){
  const st = new Map();
  for(const id of NODES.keys()) st.set(id,{state:"unborn",score:null});
  st.get(ROOT).state = "merged"; st.get(ROOT).score = BASE;
  let best = null;
  const better = s => best===null || (MIN ? s<best : s>best);
  for(const e of EVENTS){
    if(e.ts - T0 > t) break;
    const d = e.data||{}, id = d.node_id; if(!id || !st.has(id)) continue;
    const s = st.get(id);
    switch(e.type){
      case "idea.proposed": s.state="proposed"; break;
      case "executor.start": s.state="running"; break;
      case "executor.end":
        if(typeof d.score==="number"){ s.score=d.score; if(better(d.score)) best=d.score; }
        if(s.state==="running") s.state=(d.status||"done");
        break;
      case "idea.completed":
        if(typeof d.score==="number"){ s.score=d.score; if(better(d.score)) best=d.score; }
        s.state=(d.status||"done"); break;
      case "idea.merged":
        if(typeof d.to_score==="number"){ s.score=d.to_score; if(better(d.to_score)) best=d.to_score; }
        s.state="merged"; break;
      case "idea.pruned": s.state="pruned"; break;
    }
  }
  return {st,best};
}

// ── layout: tidy top-down tree over the final topology ───────────────────────
function layout(){
  const children = new Map();
  for(const n of NODES.values()){
    if(n.id===ROOT) continue;
    if(!children.has(n.parent)) children.set(n.parent,[]);
    children.get(n.parent).push(n.id);
  }
  for(const arr of children.values()) arr.sort((a,b)=>(NODES.get(a).born)-(NODES.get(b).born));
  const pos = new Map(); let leaf = 0; let maxDepth = 0;
  (function walk(id,depth){
    maxDepth = Math.max(maxDepth,depth);
    const kids = children.get(id)||[];
    if(!kids.length){ pos.set(id,{col:leaf++,depth}); return; }
    let sum=0; for(const k of kids){ walk(k,depth+1); sum+=pos.get(k).col; }
    pos.set(id,{col:sum/kids.length,depth});
  })(ROOT,0);
  return {pos,cols:Math.max(1,leaf-1),depth:maxDepth,children};
}
const L = layout();

// ── render: build SVG once, then update classes per frame ────────────────────
const svg = document.getElementById("svg");
const gN = document.getElementById("nodes"), gE = document.getElementById("edges");
const NS = "http://www.w3.org/2000/svg";
const el = (t,a)=>{const x=document.createElementNS(NS,t);for(const k in a)x.setAttribute(k,a[k]);return x;};
const nodeEls = new Map(), edgeEls = new Map();
let PAD={x:120,y:70};

function coords(id,W,H){
  const p = L.pos.get(id);
  const x = PAD.x + (L.cols? (p.col/L.cols):0.5) * Math.max(1,(W-2*PAD.x));
  const y = PAD.y + (L.depth? (p.depth/L.depth):0) * Math.max(1,(H-2*PAD.y));
  return {x,y};
}
function buildSVG(){
  gN.innerHTML=""; gE.innerHTML=""; nodeEls.clear(); edgeEls.clear();
  const W = svg.clientWidth||1000, H = svg.clientHeight||500;
  for(const n of NODES.values()){
    if(n.id===ROOT){ /* trunk still drawn */ }
    if(n.parent){
      const e = el("path",{class:"edge","data-id":n.id});
      gE.appendChild(e); edgeEls.set(n.id,e);
    }
    const g = el("g",{class:"node","data-id":n.id});
    g.appendChild(el("circle",{class:"dot",r:7,cx:0,cy:0}));
    const nid = el("text",{class:"nid",x:0,y:-13,"text-anchor":"middle"});
    nid.textContent = n.synthetic ? "base" : n.id;
    const hyp = el("text",{class:"hyp",x:12,y:4});
    hyp.textContent = trunc(n.synthetic?"baseline":n.hyp, 30);
    const sc = el("text",{class:"score",x:12,y:19});
    g.appendChild(nid); g.appendChild(hyp); g.appendChild(sc);
    const title = el("title",{}); title.textContent = n.synthetic?"baseline":n.hyp; g.appendChild(title);
    gN.appendChild(g); nodeEls.set(n.id,{g,sc,hyp});
  }
  positionSVG();
}
function positionSVG(){
  const W = svg.clientWidth||1000, H = svg.clientHeight||500;
  for(const [id,{g}] of nodeEls){ const c=coords(id,W,H); g.setAttribute("transform",`translate(${c.x},${c.y})`); }
  for(const [id,e] of edgeEls){
    const n=NODES.get(id); const a=coords(n.parent,W,H), b=coords(id,W,H);
    const my=(a.y+b.y)/2;
    e.setAttribute("d",`M${a.x},${a.y} C${a.x},${my} ${b.x},${my} ${b.x},${b.y}`);
  }
}
function trunc(s,n){ s=s||""; return s.length<=n?s:s.slice(0,n-1)+"…"; }
function fmtScore(v){ return v===null||v===undefined?"—":(Math.round(v*100)/100).toString(); }
function fmtClock(sec){ sec=Math.max(0,sec); const m=Math.floor(sec/60),s=Math.floor(sec%60); return m+":"+String(s).padStart(2,"0"); }

function render(t){
  const {st,best} = stateAt(t);
  let merged=0,pruned=0,born=0;
  for(const [id,info] of st){
    const ui = nodeEls.get(id); if(!ui) continue;
    const cls = ["node",info.state];
    const isBorn = info.state!=="unborn";
    if(isBorn) cls.push("born");
    if(id!==ROOT && isBorn) born++;
    if(info.state==="merged" && id!==ROOT) merged++;
    if(info.state==="pruned"||info.state==="failed") pruned++;
    ui.g.setAttribute("class", cls.join(" "));
    ui.sc.textContent = (info.score!=null && info.state!=="proposed" && info.state!=="running") ? fmtScore(info.score)+(MIN?"":"×") : "";
    const e = edgeEls.get(id);
    if(e){
      const parentBorn = st.get(NODES.get(id).parent)?.state!=="unborn";
      e.setAttribute("class","edge"+((isBorn&&parentBorn)?" shown":"")+
        (info.state==="merged"?" merged":"")+((info.state==="pruned"||info.state==="failed")?" pruned":""));
    }
  }
  document.getElementById("s-best").textContent = best===null?"—":fmtScore(best);
  document.getElementById("s-x").textContent = (best===null||MIN)?"":"×";
  document.getElementById("s-branches").textContent = born;
  document.getElementById("s-merged").textContent = merged;
  document.getElementById("s-pruned").textContent = pruned;
  document.getElementById("t-now").textContent = fmtClock(t);
}

// ── playback engine ──────────────────────────────────────────────────────────
let clock=0, playing=true, speed=12, raf=null, last=null;
const seek=document.getElementById("seek"), playBtn=document.getElementById("play");
function setClock(t){ clock=Math.max(0,Math.min(DURATION,t)); seek.value=Math.round(clock/DURATION*1000); render(clock); }
function tick(ts){
  if(last===null) last=ts;
  const dt=(ts-last)/1000; last=ts;
  if(playing){
    setClock(clock + dt*speed);
    if(clock>=DURATION){ playing=false; updatePlay(); }
  }
  raf=requestAnimationFrame(tick);
}
function updatePlay(){ playBtn.textContent = playing? "▮▮" : "▶"; }
playBtn.onclick=()=>{ if(clock>=DURATION) setClock(0); playing=!playing; last=null; updatePlay(); };
seek.oninput=()=>{ playing=false; updatePlay(); setClock(seek.value/1000*DURATION); };

const speeds=[1,4,12,40]; const sc=document.getElementById("speeds");
speeds.forEach(s=>{ const b=document.createElement("button"); b.textContent=s+"×";
  if(s===speed)b.className="on"; b.onclick=()=>{speed=s;[...sc.children].forEach(c=>c.className=c===b?"on":"");};
  sc.appendChild(b); });

// ── boot ─────────────────────────────────────────────────────────────────────
document.getElementById("m-run").textContent = META.run_name||"session";
document.getElementById("m-model").textContent = META.model||"";
document.getElementById("m-task").textContent = trunc(META.task||"", 120);
document.getElementById("s-base").textContent = BASE===null?"—":fmtScore(BASE)+(MIN?"":"×");
document.getElementById("t-end").textContent = fmtClock(DURATION);
function fit(){ buildSVG(); render(clock); }
addEventListener("resize", ()=>{ positionSVG(); });
fit(); setClock(0); updatePlay(); raf=requestAnimationFrame(tick);
</script>
</body>
</html>
